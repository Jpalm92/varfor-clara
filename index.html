    /* Navbar */
    .nav-bar { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: #000; padding: 0.75rem 1.5rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
    .nav-bar .hamburger { justify-self: start; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .nav-bar .hamburger svg { width: 2rem; height: 2rem; fill: #F9F7F4; }
    .nav-bar .logo { justify-self: center; display: flex; align-items: center; }
    /* Slide menu */
    #nav-menu { position: fixed; left: 0; top: 0; z-index: 200; background: #1a1a1a; width: 100%; max-width: 400px; height: 100vh; transform: translateX(-100%); transition: transform 0.3s ease; padding: 5rem 2.5rem 2rem; }
    #nav-menu.nav-visible { transform: translateX(0); }
    #nav-menu .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; cursor: pointer; }
    #nav-menu .close-btn svg { width: 2rem; height: 2rem; fill: #F9F7F4; }
    #nav-menu ul { list-style: none; padding: 0; margin: 0; }
    #nav-menu li { border-bottom: 1px solid rgba(255,255,255,0.15); padding: 1rem 0; }
    #nav-menu a { color: #F9F7F4; text-decoration: none; font-size: 1.25rem; font-weight: 600; }
    #nav-overlay { position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    #nav-menu.nav-visible ~ #nav-overlay { opacity: 1; pointer-events: auto; }
    /* Hero */
    .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 500; line-height: 1.1; margin-bottom: 1rem; }
    .hero p { font-size: clamp(1rem, 1.5vw, 1.2rem); color: rgba(255,255,255,0.5); max-width: 600px; margin: 0 auto; line-height: 1.6; }
  </style>
